<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.40"/>
      <stop offset="55%" stop-color="#14b8a6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ccfbf1" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#5eead4" stop-opacity="0.85"/>
      <stop offset="80%" stop-color="#14b8a6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="crisp" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- ambient halo -->
  <circle cx="60" cy="60" r="56" fill="url(#halo)"/>

  <!-- the ring -->
  <circle cx="60" cy="60" r="44" fill="none" stroke="#0e7490" stroke-width="2.2" opacity="0.35" filter="url(#soft)"/>
  <circle cx="60" cy="60" r="38" fill="none" stroke="#14b8a6" stroke-width="2.6" opacity="0.75" filter="url(#soft)"/>
  <circle cx="60" cy="60" r="38" fill="none" stroke="#2dd4bf" stroke-width="1.4" opacity="0.7" filter="url(#crisp)"/>

  <!-- the orb -->
  <circle cx="60" cy="60" r="22" fill="url(#core)" filter="url(#crisp)"/>
</svg>
